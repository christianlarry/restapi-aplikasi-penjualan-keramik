services:
  redis:
    image: redis:8.4-alpine
    container_name: penjualan-keramik-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - penjualan_keramik_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: penjualan-keramik-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - penjualan_keramik_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:9200/_cat/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  penjualan_keramik_redis_data:
  penjualan_keramik_es_data:
